name: Build and Deploy Jekyll Site

on:
  push:
    branches:
      - main

  schedule:
    # UTCの毎日15:00（日本時間の深夜0:00）に自動実行
    - cron: "10 15 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest video IDs from YouTube API
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          SAKITABE_ID=$(curl -s "https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=UC_UeGVVguLN0Kl9mXc5r81g&part=snippet&order=date&maxResults=1&type=video" | python3 -c "import sys,json; print(json.load(sys.stdin)['items'][0]['id']['videoId'])")
          MEKZ_ID=$(curl -s "https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=UCp8g7yFGOAJzIYD2F10ycHQ&part=snippet&order=date&maxResults=1&type=video" | python3 -c "import sys,json; print(json.load(sys.stdin)['items'][0]['id']['videoId'])")

          python3 << EOF
          import os, re
          sakitabe_id = "$SAKITABE_ID"
          mekz_id = "$MEKZ_ID"
          with open("_includes/video_section.html", "r", encoding="utf-8") as f:
              content = f.read()
          content = re.sub(r'(id="sakitabe".*?<iframe[^>]*src="https://www\.youtube\.com/embed/)[^?]+(\?[^"]*")', lambda m: m.group(1) + sakitabe_id + m.group(2), content, flags=re.DOTALL)
          content = re.sub(r'(id="mekz".*?<iframe[^>]*src="https://www\.youtube\.com/embed/)[^?]+(\?[^"]*")', lambda m: m.group(1) + mekz_id + m.group(2), content, flags=re.DOTALL)
          with open("_includes/video_section.html", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Updated: sakitabe={sakitabe_id}, mekz={mekz_id}")
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1" # Rubyのバージョン
          bundler-cache: true # bundle installを高速化

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
